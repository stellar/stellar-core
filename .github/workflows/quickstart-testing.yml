name: Quickstart

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    uses: stellar/quickstart/.github/workflows/build.yml@ae7121d351cf7c92e5cf219bc54aed8a40353fc9
    with:
      images: |
        [
          {
            "tag": "pr",
            "inherit": "testing",
            "config": {
              "protocol_version_default": 25
            },
            "deps": [
              { "name": "core", "repo": "${{ github.event.pull_request.head.repo.full_name }}", "ref": "${{ github.event.pull_request.head.sha }}", "options": { "configure_flags": "--disable-tests" } }
            ]
          }
        ]
      archs: '["amd64"]'

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: stellar/quickstart@main
        with:
          artifact: image-quickstart-pr-amd64.tar
          tag: pr-amd64
