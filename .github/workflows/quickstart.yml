name: Quickstart

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    uses: stellar/quickstart/.github/workflows/build.yml@582974c4748dfb4fa09499d5bb2f26f0a3269c8c
    with:
      ref: 582974c4748dfb4fa09499d5bb2f26f0a3269c8c
      images: |
        [
          {
            "tag": "testing-with-pr",
            "inherit": "testing",
            "config": {
              "protocol_version_default": 25
            },
            "deps": [
              { "name": "core", "repo": "${{ github.event.pull_request.head.repo.full_name }}", "ref": "${{ github.event.pull_request.head.sha }}", "options": { "configure_flags": "--disable-tests" } }
            ]
          },
          {
            "tag": "nightly-with-pr",
            "inherit": "nightly",
            "config": {
              "protocol_version_default": 25
            },
            "deps": [
              { "name": "core", "repo": "${{ github.event.pull_request.head.repo.full_name }}", "ref": "${{ github.event.pull_request.head.sha }}", "options": { "configure_flags": "--disable-tests" } }
            ]
          },
          {
            "tag": "nightly-next-with-pr",
            "inherit": "nightly-next",
            "config": {
              "protocol_version_default": 26,
              "horizon_skip_protocol_version_check": true
            },
            "deps": [
              { "name": "core", "repo": "${{ github.event.pull_request.head.repo.full_name }}", "ref": "${{ github.event.pull_request.head.sha }}", "options": { "configure_flags": "--disable-tests" } }
            ]
          }
        ]
      archs: '["amd64"]'
